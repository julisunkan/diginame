{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="text-white animate__animated animate__fadeInLeft">
        <i class="fas fa-lock me-2"></i>Change Password
    </h1>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary animate__animated animate__fadeInRight">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>
</div>

<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-md-6">
        <div class="card blog-card">
            <div class="card-body p-4">
                <p class="text-muted mb-4">
                    Your new password will be stored securely (hashed) in Firebase.
                </p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="current_password" class="form-label fw-semibold">Current Password</label>
                        <input type="password" class="form-control" id="current_password"
                               name="current_password" required autocomplete="current-password">
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label fw-semibold">New Password</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" required autocomplete="new-password"
                               minlength="8">
                        <div class="form-text">Minimum 8 characters.</div>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-semibold">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" required autocomplete="new-password"
                               minlength="8">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-gradient py-2">
                            <i class="fas fa-save me-2"></i>Update Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
