{% extends "base.html" %}

{% block title %}Admin Credentials{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="text-white animate__animated animate__fadeInLeft">
        <i class="fas fa-user-shield me-2"></i>Admin Credentials
    </h1>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary animate__animated animate__fadeInRight">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>
</div>

<div class="row g-4 animate__animated animate__fadeIn">

    <!-- Change Username -->
    <div class="col-md-6">
        <div class="card blog-card h-100">
            <div class="card-body p-4">
                <h5 class="card-title mb-1">
                    <i class="fas fa-user me-2"></i>Change Username
                </h5>
                <p class="text-muted small mb-4">
                    Current username: <strong>{{ current_username }}</strong>
                </p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="action" value="username">

                    <div class="mb-3">
                        <label for="new_username" class="form-label fw-semibold">New Username</label>
                        <input type="text" class="form-control" id="new_username"
                               name="new_username" required minlength="3"
                               autocomplete="username" placeholder="Minimum 3 characters">
                    </div>

                    <div class="mb-4">
                        <label for="current_password_u" class="form-label fw-semibold">
                            Current Password <span class="text-muted fw-normal">(to confirm)</span>
                        </label>
                        <input type="password" class="form-control" id="current_password_u"
                               name="current_password" required autocomplete="current-password">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-gradient py-2">
                            <i class="fas fa-user-edit me-2"></i>Update Username
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Change Password -->
    <div class="col-md-6">
        <div class="card blog-card h-100">
            <div class="card-body p-4">
                <h5 class="card-title mb-1">
                    <i class="fas fa-lock me-2"></i>Change Password
                </h5>
                <p class="text-muted small mb-4">
                    Your new password will be stored securely (hashed) in Firebase.
                </p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="action" value="password">

                    <div class="mb-3">
                        <label for="current_password_p" class="form-label fw-semibold">Current Password</label>
                        <input type="password" class="form-control" id="current_password_p"
                               name="current_password" required autocomplete="current-password">
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label fw-semibold">New Password</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" required minlength="8"
                               autocomplete="new-password" placeholder="Minimum 8 characters">
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-semibold">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" required minlength="8"
                               autocomplete="new-password">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning btn-gradient py-2">
                            <i class="fas fa-key me-2"></i>Update Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
{% endblock %}
