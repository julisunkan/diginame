{% extends "base.html" %}
{% block title %}{{ error_code }} - {{ site_settings.blog_title }}{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center animate__animated animate__fadeIn">
    <div style="font-size:6rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#4f46e5,#a855f7,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        {{ error_code }}
    </div>
    <h2 class="mt-3 mb-2 text-white fw-bold">{{ error_title }}</h2>
    <p class="text-white-50 mb-4" style="max-width:400px;">{{ error_msg }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-gradient btn-lg px-5">
        <i class="fas fa-home me-2"></i>Go Home
    </a>
</div>
{% endblock %}
