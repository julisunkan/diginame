<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Floating particles */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.06) 2px, transparent 2px),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06) 2px, transparent 2px),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 55px 55px, 70px 70px, 35px 35px;
            animation: drift 25s linear infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0%   { background-position: 0 0, 0 0, 0 0; }
            100% { background-position: 55px 55px, -70px 70px, 35px -35px; }
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 52px 44px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            animation: floatIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-wrap {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #a855f7, #f43f5e);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: pulse-glow 3s ease-in-out infinite;
            box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); transform: scale(1); }
            50%       { box-shadow: 0 0 0 20px rgba(168, 85, 247, 0); transform: scale(1.05); }
        }

        .icon-wrap i {
            font-size: 2.6rem;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .tips {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 32px;
            text-align: left;
        }

        .tips-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }

        .tip-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            padding: 6px 0;
        }

        .tip-item i {
            font-size: 0.75rem;
            color: #a855f7;
            width: 16px;
            flex-shrink: 0;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #4f46e5, #a855f7);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
            width: 100%;
            justify-content: center;
            margin-bottom: 14px;
        }

        .btn-retry:hover {
            background: linear-gradient(135deg, #4338ca, #9333ea);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.5);
            color: #fff;
        }

        .btn-retry:active { transform: translateY(0); }

        .btn-retry i { transition: transform 0.4s ease; }
        .btn-retry:hover i { transform: rotate(360deg); }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f43f5e;
            margin-right: 6px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        .connection-status {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 6px;
        }

        /* Reconnected state */
        .reconnected .icon-wrap {
            background: linear-gradient(135deg, #059669, #10b981);
        }
        .reconnected .status-dot { background: #10b981; animation: none; }
        .reconnected h1::after { content: ' — Back Online!'; font-size: 1.2rem; color: #10b981; display: block; }
    </style>
</head>
<body>
    <div class="card-glass" id="offlineCard">
        <div class="icon-wrap">
            <i class="fas fa-wifi" id="wifiIcon"></i>
        </div>

        <h1 id="headline">You're Offline</h1>
        <p class="subtitle" id="subtext">
            No internet connection detected.<br>
            Some content may still be available from your cache.
        </p>

        <div class="tips">
            <div class="tips-title">While you wait</div>
            <div class="tip-item"><i class="fas fa-circle-check"></i> Previously visited posts are still readable</div>
            <div class="tip-item"><i class="fas fa-circle-check"></i> Check your Wi-Fi or mobile data</div>
            <div class="tip-item"><i class="fas fa-circle-check"></i> Try switching networks or toggling airplane mode</div>
        </div>

        <button class="btn-retry" onclick="retryConnection()" id="retryBtn">
            <i class="fas fa-rotate-right"></i> Try Again
        </button>

        <div class="connection-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">No connection</span>
        </div>
    </div>

    <script>
        function retryConnection() {
            const btn = document.getElementById('retryBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking…';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            setTimeout(() => {
                if (navigator.onLine) {
                    window.location.href = '/';
                } else {
                    btn.innerHTML = '<i class="fas fa-rotate-right"></i> Try Again';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }
            }, 1500);
        }

        function setOnline() {
            document.getElementById('offlineCard').classList.add('reconnected');
            document.getElementById('wifiIcon').className = 'fas fa-wifi';
            document.getElementById('headline').textContent = 'Back Online';
            document.getElementById('subtext').textContent = 'Your connection has been restored. Redirecting…';
            document.getElementById('statusText').textContent = 'Connection restored';
            document.getElementById('statusDot').style.background = '#10b981';
            document.getElementById('statusDot').style.animation = 'none';
            setTimeout(() => { window.location.href = '/'; }, 1500);
        }

        window.addEventListener('online', setOnline);

        // Check immediately in case already back online
        if (navigator.onLine) {
            setOnline();
        }
    </script>
</body>
</html>
