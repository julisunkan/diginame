<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrap { width: 100%; max-width: 400px; }
        .login-icon {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff; margin: 0 auto 20px;
            box-shadow: 0 12px 30px rgba(124,58,237,.4);
        }
        .card {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(20px);
        }
        .form-label { color: rgba(255,255,255,.8); font-weight: 600; font-size: .9rem; }
        .form-control {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 10px;
            color: #fff;
            padding: 10px 14px;
        }
        .form-control::placeholder { color: rgba(255,255,255,.3); }
        .form-control:focus {
            background: rgba(255,255,255,.12);
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167,139,250,.2);
            color: #fff;
        }
        .input-group-text {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            color: rgba(255,255,255,.5);
            cursor: pointer;
            border-radius: 0 10px 10px 0;
        }
        .input-group .form-control { border-radius: 10px 0 0 10px; }
        .btn-login {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none; color: #fff; border-radius: 10px;
            padding: 12px; font-weight: 700; font-size: 1rem;
            width: 100%; transition: all .2s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #6d28d9, #9333ea);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,58,237,.4);
        }
        .alert-danger {
            background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
            color: #f87171; border-radius: 10px; font-size: .9rem;
        }
        .alert-success {
            background: rgba(52,211,153,.15); border: 1px solid rgba(52,211,153,.3);
            color: #34d399; border-radius: 10px; font-size: .9rem;
        }
        .back-link { color: rgba(255,255,255,.4); font-size: .85rem; text-decoration: none; }
        .back-link:hover { color: rgba(255,255,255,.7); }
    </style>
</head>
<body>
<div class="login-wrap animate__animated animate__fadeInUp">
    <div class="text-center mb-4">
        <div class="login-icon"><i class="fas fa-shield-halved"></i></div>
        <h2 style="color:#fff; font-weight:800; margin-bottom:6px;">Super Admin</h2>
        <p style="color:rgba(255,255,255,.5); font-size:.9rem;">Platform administration login</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }} mb-3">
                <i class="fas fa-{{ 'times-circle' if category == 'error' else 'check-circle' }} me-2"></i>{{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    <div class="card">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user me-2" style="color:#a78bfa;"></i>Username</label>
                <input type="text" class="form-control" name="username" required autocomplete="username" placeholder="Enter username">
            </div>
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-lock me-2" style="color:#a78bfa;"></i>Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" name="password" id="password" required autocomplete="current-password" placeholder="Enter password">
                    <span class="input-group-text" onclick="togglePass()">
                        <i class="fas fa-eye" id="passIcon"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In as Super Admin
            </button>
        </form>
    </div>

    <div class="text-center mt-3">
        <a href="{{ url_for('index') }}" class="back-link">
            <i class="fas fa-arrow-left me-1"></i>Back to blogs
        </a>
    </div>
</div>

<script>
function togglePass() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('passIcon');
    if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
    else { inp.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}
</script>
</body>
</html>
